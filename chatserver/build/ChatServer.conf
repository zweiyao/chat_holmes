# ============================================================================
# AIChatServer 配置文件
#   - 格式: gflags --flagfile 标准格式, 每行一个 --key=value
#   - 解析: 由 gflags 库通过 google::ReadFromFlagsFile() 自动解析
#   - 优先级: 命令行参数 > 本配置文件 > gflags 默认值
#   - '#' 开头为注释; 空行被忽略
# ============================================================================

# ---- 网络配置 ----
--host=0.0.0.0
--port=8080

# ---- 日志配置 ----
# 可选: TRACE | DEBUG | INFO | WARN | ERROR | CRITICAL
--log_level=INFO

# ---- 模型通用参数 ----
# temperature 取值范围 [0.0, 2.0]
--temperature=0.7
# max_tokens 必须为正整数
--max_tokens=2048

# ---- Ollama 本地模型配置 (三项均不可为空) ----
--ollama_endpoint=http://localhost:11434
--ollama_model_name=qwen3.5:9b
--ollama_model_desc=Ollama 本地部署的 Qwen3.5 9B 模型

# ---- 说明 ----
# 云端模型 (DeepSeek / ChatGPT / Gemini) 的 API Key 不放在本文件中,
# 仅从环境变量读取:
#   DEEPSEEK_API_KEY / CHATGPT_API_KEY / GEMINI_API_KEY
